<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome, I am Jarvis</h1>
            <p>Sign in to continue</p>
        </div>

        <div class="auth-form">
            <input id="email" type="email" placeholder="Email" />
            <input id="password" type="password" placeholder="Password" />

            <button id="loginBtn" class="primary-btn">Sign in</button>
            <button id="signupBtn" class="secondary-btn">Create account</button>

            <div class="divider">or</div>

            <button id="googleBtn" class="google-btn">Continue with Google</button>
        </div>
    </div>
</div>
